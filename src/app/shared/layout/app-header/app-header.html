<header class="app-header">
  <div class="bar">
    <a routerLink="/" class="brand" aria-label="Lern- und Prüf-Simulator — Startseite">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
             stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 7l4 5-4 5" />
          <path d="M13 17h6" />
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">LernPrüf<span class="brand-accent">Sim</span></span>
        <span class="brand-sub">LPIC-1 Vorbereitung</span>
      </span>
    </a>

    <button type="button" class="theme-toggle"
            (click)="theme.toggle()"
            [attr.aria-label]="theme.theme() === 'dark'
              ? 'Zum hellen Design wechseln'
              : 'Zum dunklen Design wechseln'"
            [attr.aria-pressed]="theme.theme() === 'dark'">
      @if (theme.theme() === 'dark') {
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
        </svg>
      }
    </button>
  </div>
</header>
