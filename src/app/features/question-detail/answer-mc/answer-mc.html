<div class="options">
  @for (a of question().answers; track a.id) {
    <mat-checkbox
      [class.correct-answer]="checked() && a.isCorrect"
      [class.wrong-answer]="checked() && !a.isCorrect && selectedIds()
      .includes(a.id)"
      (change)="toggle(a.id, $event.checked)">
      {{ a.answerText }}
    </mat-checkbox>
  }
</div>

  <app-answer-actions
  [mode]="mode()"
  [checked]="checked()"
  [isCorrect]="isCorrect()"
  [correctAnswers]="correctAnswers()"
  (pruefen)="checked.set(true)" />
