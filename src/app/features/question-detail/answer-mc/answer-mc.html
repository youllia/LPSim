@for (a of question().answers; track a.id) {
  <mat-checkbox
    (change)="toggle(a.id, $event.checked)">
    {{ a.answerText }}
  </mat-checkbox>
}

  <app-answer-actions
  [mode]="mode()"
  [checked]="checked()"
  [isCorrect]="isCorrect()"
  [correctAnswers]="correctAnswers()"
  (pruefen)="checked.set(true)" />
