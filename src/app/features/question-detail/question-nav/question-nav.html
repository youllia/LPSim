<nav class="question-nav">
  <button matButton="outlined"
          [disabled]="prevId() === undefined"
          (click)="goPrev()">
    ← Vorherige
  </button>

  <button matButton="outlined"
          class="next"
          [disabled]="nextId() === undefined"
          (click)="goNext()">
    Nächste →
  </button>

  @if (isExam()) {
    @if (isLastQuestion()) {
      <a matButton="filled" class="finish-btn" (click)="finishExam()">
        Prüfung beenden
      </a>
    } @else {
      <a matButton="outlined" class="finish-btn muted" (click)="finishExam()">
        Prüfung beenden
      </a>
    }
  } @else {
    @if (isLastQuestion()) {
      <a matButton="filled" class="finish-btn"
         [routerLink]="['/catalogs', catalogId(), 'questions']">
        ≡ Fragenliste
      </a>
    } @else {
      <a matButton="outlined" class="finish-btn muted"
         [routerLink]="['/catalogs', catalogId(), 'questions']">
        ≡ Fragenliste
      </a>
    }
  }
</nav>
