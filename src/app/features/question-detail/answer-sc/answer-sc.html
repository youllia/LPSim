<mat-radio-group
  [value]="selectedId()"
  (change)="selectedId.set($event.value)">
  @for (a of question().answers; track a.id) {
    <mat-radio-button
      [value]="a.id"
      [class.correct-answer]="checked() && a.isCorrect"
      [class.wrong-answer]="checked() && !a.isCorrect && selectedId() === a.id">
      {{ a.answerText }}
    </mat-radio-button>
  }
</mat-radio-group>

<app-answer-actions
  [mode]="mode()"
  [checked]="checked()"
  [isCorrect]="isCorrect()"
  [correctAnswers]="correctAnswers()"
  (pruefen)="checked.set(true)" />
