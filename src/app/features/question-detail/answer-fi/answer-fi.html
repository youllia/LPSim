<mat-form-field>
  <input matInput
    [value]="userInput()"
    (input)="userInput.set($any($event.target).value)"
    placeholder="Antwort eingeben"
    aria-label="Antwort" />
</mat-form-field>

@if (mode() === 'lernen' && !checked()) {
  <button matButton="filled" (click)="checked.set(true)">Antwort prüfen</button>
}

<app-answer-feedback
  [checked]="checked()"
  [isCorrect]="isCorrect()"
  [correctAnswers]="correctAnswers()" />
